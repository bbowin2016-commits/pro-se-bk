<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florida Pro Se Chapter 7 • Diagnostic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>body{font-family:'Inter',system_ui,sans-serif}</style>
</head>
<body class="bg-gray-50 p-8">

<div class="max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">Diagnostic Tool – Field Names</h1>
  <p class="mb-6">This will load your form_b_101.pdf and show every field name that actually exists.</p>

  <button onclick="showFieldNames()" 
          class="px-8 py-4 bg-blue-700 text-white font-semibold rounded-2xl">
    Load PDF and Show All Field Names
  </button>

  <pre id="output" class="mt-8 bg-white p-6 rounded-2xl border text-sm overflow-auto max-h-96"></pre>
</div>

<script>
  async function showFieldNames() {
    const output = document.getElementById('output');
    output.textContent = "Loading form_b_101.pdf...\n";

    try {
      const { PDFDocument } = PDFLib;
      const url = "./form_b_101.pdf";
      const existingPdfBytes = await fetch(url).then(res => res.arrayBuffer());
      const pdfDoc = await PDFDocument.load(existingPdfBytes);
      const form = pdfDoc.getForm();

      const fields = form.getFields();
      output.textContent += `Found ${fields.length} fields:\n\n`;

      fields.forEach((field, i) => {
        const name = field.getName();
        output.textContent += `${i+1}. ${name}\n`;
        console.log(`Field ${i+1}:`, name);
      });

      output.textContent += "\n\nCheck the browser console (F12) for the full list too.";
    } catch (err) {
      output.textContent += "\nError: " + err.message;
      console.error(err);
    }
  }
</script>
</body>
</html>
